<svg id="logo" class="logo" width="631" height="165" viewBox="-50 0 531 95" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
* {
    margin: 0;
    padding: 0;
}
body {
    width: 100%;
    height: 100vh;
    background: #333;
}

.logo {
    position: absolute;
    top: 50%;
    left: 55%;
    transform: translate(-50%, -50%);
    animation: fill-anm 500ms ease forwards 3500ms;
}

.logo path:nth-child(1) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards;
}

.logo path:nth-child(2) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 300ms;
}

.logo path:nth-child(3) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 600ms;
}

.logo path:nth-child(4) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 900ms;
}

.logo path:nth-child(5) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 1200ms;
}

.logo path:nth-child(6) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 1500ms;
}

.logo path:nth-child(7) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 1800ms;
}
    
.logo path:nth-child(8) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 2100ms;
}

.logo path:nth-child(9) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 2400ms;
}

.logo path:nth-child(10) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 2700ms;
}

.logo path:nth-child(11) {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: line-anm 3s ease forwards 3200ms;
}


@keyframes line-anm {
    to {
        stroke-dashoffset: 0;
    }
}

@keyframes fill-anm {
    from {
        fill: transparent;
    }
    to {
        fill: #FD3FD3;
    }
}
</style>





