<svg width="100%" height="100vh" xmlns="http://www.w3.org/2000/svg" >
        <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
svg {
  background: rgba(0,0,0,0.0);
}
svg text {
  font-size: 14vw;
  font-weight: 900;
  stroke-width: 8px;
  fill: transparent;
  stroke: #ffc8dd;
  letter-spacing: 8px;
  stroke-dasharray: 100%!important;
  stroke-dashoffset: 100%;
  animation: line-anm 5s forwards;
}
@keyframes line-anm {
  to {
    stroke-dashoffset: 0;
  }
}

        </style>
  <text x="25%" y="50%">lingerw</text>
</svg>
