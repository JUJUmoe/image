<svg width="100%" height="100vh" xmlns="http://www.w3.org/2000/svg" > 
    <defs>
        <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
svg {
  background: #101010;
}
svg text {
  font-size: 10vw;
  font-weight: 900;
  stroke-width: 2px;
  fill: transparent;
  stroke: #ffc8dd;
  letter-spacing: 4px;
  stroke-dasharray: 100%!important;
  stroke-dashoffset: 100%;
  animation: line-anm 4s forwards;
}
@keyframes line-anm {
  to {
    stroke-dashoffset: 0;
  }
}

        </style>
    </defs>
  <text x="30%" y="50%">lingerw</text>
</svg>
