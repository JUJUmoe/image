<svg id="logo" class="logo" width="560" height="134" viewBox="0 0 560 134" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
<style>
* {
    margin: 0;
    padding: 0;
}
body {
    width: 100%;
    height: 100vh;
    background: #333;
}

.logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: fill-anm 500ms ease forwards 2800ms;
}

.logo path:nth-child(1) {
    stroke-dasharray: 497;
    stroke-dashoffset: 497;
    animation: line-anm 2s ease forwards;
}

.logo path:nth-child(2) {
    stroke-dasharray: 497;
    stroke-dashoffset: 497;
    animation: line-anm 2s ease forwards 300ms;
}

.logo path:nth-child(3) {
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: line-anm 2s ease forwards 600ms;
}

.logo path:nth-child(4) {
    stroke-dasharray: 497;
    stroke-dashoffset: 497;
    animation: line-anm 2s ease forwards 900ms;
}

.logo path:nth-child(5) {
    stroke-dasharray: 497;
    stroke-dashoffset: 497;
    animation: line-anm 2s ease forwards 1200ms;
}

.logo path:nth-child(6) {
    stroke-dasharray: 497;
    stroke-dashoffset: 497;
    animation: line-anm 2s ease forwards 1500ms;
}

.logo path:nth-child(7) {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: line-anm 2s ease forwards 1800ms;
}

@keyframes line-anm {
    to {
        stroke-dashoffset: 0;
    }
}

@keyframes fill-anm {
    from {
        fill: transparent;
    }
    to {
        fill: white;
    }
}
</style>
</style>


